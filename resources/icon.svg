<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C3CE9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A1FB8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hex" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C4B5FD;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  <!-- macOS-style rounded rect with padding -->
  <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#bg)"/>
  <!-- Center hexagon (lead agent) -->
  <polygon points="512,340 572,370 572,430 512,460 452,430 452,370" fill="url(#glow)" stroke="#E9D5FF" stroke-width="3"/>
  <!-- Top-left hex -->
  <polygon points="452,280 512,310 512,370 452,400 392,370 392,310" fill="url(#hex)" opacity="0.85" stroke="#C4B5FD" stroke-width="2"/>
  <!-- Top-right hex -->
  <polygon points="572,280 632,310 632,370 572,400 512,370 512,310" fill="url(#hex)" opacity="0.85" stroke="#C4B5FD" stroke-width="2"/>
  <!-- Left hex -->
  <polygon points="392,370 452,400 452,460 392,490 332,460 332,400" fill="url(#hex)" opacity="0.7" stroke="#C4B5FD" stroke-width="2"/>
  <!-- Right hex -->
  <polygon points="632,370 692,400 692,460 632,490 572,460 572,400" fill="url(#hex)" opacity="0.7" stroke="#C4B5FD" stroke-width="2"/>
  <!-- Bottom-left hex -->
  <polygon points="452,460 512,490 512,550 452,580 392,550 392,490" fill="url(#hex)" opacity="0.85" stroke="#C4B5FD" stroke-width="2"/>
  <!-- Bottom-right hex -->
  <polygon points="572,460 632,490 632,550 572,580 512,550 512,490" fill="url(#hex)" opacity="0.85" stroke="#C4B5FD" stroke-width="2"/>
  <!-- Bottom hex -->
  <polygon points="512,550 572,580 572,640 512,670 452,640 452,580" fill="url(#hex)" opacity="0.6" stroke="#C4B5FD" stroke-width="2"/>
  <!-- Connection dots on center hex -->
  <circle cx="512" cy="400" r="8" fill="#F5F3FF"/>
  <circle cx="482" cy="385" r="5" fill="#E9D5FF"/>
  <circle cx="542" cy="385" r="5" fill="#E9D5FF"/>
  <circle cx="482" cy="415" r="5" fill="#E9D5FF"/>
  <circle cx="542" cy="415" r="5" fill="#E9D5FF"/>
  <!-- Pulse lines from center -->
  <line x1="482" y1="385" x2="452" y2="370" stroke="#E9D5FF" stroke-width="2" opacity="0.6"/>
  <line x1="542" y1="385" x2="572" y2="370" stroke="#E9D5FF" stroke-width="2" opacity="0.6"/>
  <line x1="482" y1="415" x2="452" y2="430" stroke="#E9D5FF" stroke-width="2" opacity="0.6"/>
  <line x1="542" y1="415" x2="572" y2="430" stroke="#E9D5FF" stroke-width="2" opacity="0.6"/>
</svg>
